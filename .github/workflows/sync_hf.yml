name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # O repositório oficial do projeto no Hugging Face (deduzido pela URL do seu print)
          git remote add space https://jacksonsantosjr:$HF_TOKEN@huggingface.co/spaces/jacksonsantosjr/efd-compliance
          git push --force space main
